<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropertyPulse — Follow-Up Tracker</title>
    <meta name="description" content="Smart follow-up tracker for real estate professionals. Never miss a client follow-up again.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast Notification -->
    <div id="toast-container"></div>

    <!-- Reminder Alert Banner -->
    <div id="reminder-banner" class="reminder-banner hidden">
        <div class="reminder-banner-content">
            <span class="reminder-icon">🔔</span>
            <span id="reminder-text">You have follow-ups tomorrow!</span>
            <button id="reminder-dismiss" class="reminder-dismiss" aria-label="Dismiss">&times;</button>
        </div>
    </div>

    <!-- App Container -->
    <div class="app-container">
        
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">🏠</span>
                    <div>
                        <h1>PropertyPulse</h1>
                        <p class="tagline">Never miss a follow-up</p>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="date-display" id="current-date"></div>
                <button class="btn-icon" id="notification-btn" title="Enable Notifications" aria-label="Enable notifications">
                    <span>🔕</span>
                </button>
            </div>
        </header>

        <!-- Stats Cards -->
        <section class="stats-grid" aria-label="Statistics">
            <div class="stat-card stat-total">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">Total Clients</div>
                <div class="stat-icon">👥</div>
            </div>
            <div class="stat-card stat-today">
                <div class="stat-number" id="stat-today">0</div>
                <div class="stat-label">Today's Follow-ups</div>
                <div class="stat-icon">📋</div>
            </div>
            <div class="stat-card stat-tomorrow">
                <div class="stat-number" id="stat-tomorrow">0</div>
                <div class="stat-label">Tomorrow's Follow-ups</div>
                <div class="stat-icon">⏰</div>
            </div>
            <div class="stat-card stat-overdue">
                <div class="stat-number" id="stat-overdue">0</div>
                <div class="stat-label">Overdue</div>
                <div class="stat-icon">⚠️</div>
            </div>
        </section>

        <!-- Main Content Grid -->
        <div class="main-grid">

            <!-- Add Client Form -->
            <section class="card form-card" aria-label="Add new client">
                <div class="card-header">
                    <h2>➕ Add New Follow-Up</h2>
                </div>
                <form id="followup-form" class="form">
                    <div class="form-group">
                        <label for="client-name">Client Name *</label>
                        <input type="text" id="client-name" placeholder="e.g. Rajesh Sharma" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="client-phone">Phone Number</label>
                        <input type="tel" id="client-phone" placeholder="e.g. 9876543210" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="property-detail">Property Details</label>
                        <input type="text" id="property-detail" placeholder="e.g. 3BHK, Sector 62, Noida" autocomplete="off">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="followup-type">Follow-Up Type</label>
                            <select id="followup-type">
                                <option value="call">📞 Call</option>
                                <option value="meeting">🤝 Meeting</option>
                                <option value="site-visit">🏗️ Site Visit</option>
                                <option value="document">📄 Document</option>
                                <option value="payment">💰 Payment</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority">
                                <option value="medium">🟡 Medium</option>
                                <option value="high">🔴 High</option>
                                <option value="low">🟢 Low</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="followup-schedule">Follow-Up Schedule *</label>
                        <select id="followup-schedule" required>
                            <option value="">-- Select Day --</option>
                            <option value="monday">Monday</option>
                            <option value="tuesday">Tuesday</option>
                            <option value="wednesday">Wednesday</option>
                            <option value="thursday">Thursday</option>
                            <option value="friday">Friday</option>
                            <option value="saturday">Saturday</option>
                            <option value="sunday">Sunday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="followup-date">Or Pick Exact Date</label>
                        <input type="date" id="followup-date">
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" placeholder="Any additional notes..." rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        <span>Add Follow-Up</span>
                    </button>
                </form>
            </section>

            <!-- Follow-up List -->
            <section class="card list-card" aria-label="Follow-up list">
                <div class="card-header">
                    <h2>📅 Follow-Ups</h2>
                    <div class="filter-tabs">
                        <button class="tab active" data-filter="all" id="filter-all">All</button>
                        <button class="tab" data-filter="today" id="filter-today">Today</button>
                        <button class="tab" data-filter="tomorrow" id="filter-tomorrow">Tomorrow</button>
                        <button class="tab" data-filter="this-week" id="filter-week">This Week</button>
                        <button class="tab" data-filter="overdue" id="filter-overdue">Overdue</button>
                    </div>
                </div>
                
                <!-- Search -->
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Search by name, phone, or property..." aria-label="Search follow-ups">
                </div>

                <!-- Follow-up Items -->
                <div id="followup-list" class="followup-list">
                    <!-- Items rendered by JS -->
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">📭</div>
                    <h3>No follow-ups yet</h3>
                    <p>Add your first client follow-up to get started!</p>
                </div>
            </section>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Edit follow-up">
        <div class="modal">
            <div class="modal-header">
                <h2>✏️ Edit Follow-Up</h2>
                <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
            </div>
            <form id="edit-form" class="form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-client-name">Client Name *</label>
                    <input type="text" id="edit-client-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-client-phone">Phone Number</label>
                    <input type="tel" id="edit-client-phone">
                </div>
                <div class="form-group">
                    <label for="edit-property-detail">Property Details</label>
                    <input type="text" id="edit-property-detail">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-followup-type">Follow-Up Type</label>
                        <select id="edit-followup-type">
                            <option value="call">📞 Call</option>
                            <option value="meeting">🤝 Meeting</option>
                            <option value="site-visit">🏗️ Site Visit</option>
                            <option value="document">📄 Document</option>
                            <option value="payment">💰 Payment</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-priority">Priority</label>
                        <select id="edit-priority">
                            <option value="medium">🟡 Medium</option>
                            <option value="high">🔴 High</option>
                            <option value="low">🟢 Low</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-followup-schedule">Follow-Up Day</label>
                    <select id="edit-followup-schedule">
                        <option value="">-- Select Day --</option>
                        <option value="monday">Monday</option>
                        <option value="tuesday">Tuesday</option>
                        <option value="wednesday">Wednesday</option>
                        <option value="thursday">Thursday</option>
                        <option value="friday">Friday</option>
                        <option value="saturday">Saturday</option>
                        <option value="sunday">Sunday</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-followup-date">Or Pick Exact Date</label>
                    <input type="date" id="edit-followup-date">
                </div>
                <div class="form-group">
                    <label for="edit-notes">Notes</label>
                    <textarea id="edit-notes" rows="2"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
